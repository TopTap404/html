<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Display Temperature Data</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles-register.css">
</head>

<body>
  <img src="../html/img/Vector.svg" alt="Logo" class="logo">
  <div class="Flowglow">
    <h1>Flowglow</h1>
  </div>
  <div class="form-container">
    <h2>Sign Up</h2>
    <form id="registerform" method="POST">
      <div class="input-box">
        <input type="email" id="email" placeholder="Email" required>
      </div>
      <div class="input-box">
        <input type="password" id="password" placeholder="Password" required>
      </div>
      <div class="input-box">
        <input type="password" id="cfpassword" placeholder=" Comfirm Password" required>
      </div>
      <div class="button-container">
        <button type="submit" class="button" onclick="window.history.back()">Sign Up</button>
        <button onclick="window.history.back()" class="button">Back</button>
      </div>
    </form>
  </div>
  <script src="script-register.js"></script>
</body>

</html>
